<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1700" viewBox="0 0 2400 1700">
  <defs>
    <linearGradient id="navyA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07142C"/>
      <stop offset="0.56" stop-color="#0B2348"/>
      <stop offset="1" stop-color="#091B37"/>
    </linearGradient>
    <linearGradient id="navyB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050B19"/>
      <stop offset="1" stop-color="#12345E"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF3D5"/>
      <stop offset="1" stop-color="#D9B76D"/>
    </linearGradient>
    <linearGradient id="skyWarm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#112B55"/>
      <stop offset="0.45" stop-color="#253E72"/>
      <stop offset="1" stop-color="#DAB770"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="markGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { fill:#5B6574; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size:28px; letter-spacing:0.04em; }
      .caption { fill:#8A7550; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size:20px; letter-spacing:0.08em; }
      .icon-bg { filter:url(#softShadow); }
      .hairline { fill:none; stroke:#E4C27A; stroke-width:18; stroke-linecap:round; stroke-linejoin:round; }
      .thin { fill:none; stroke:#F2DBA3; stroke-width:10; stroke-linecap:round; stroke-linejoin:round; }
      .paper-stroke { fill:none; stroke:#FFF3D5; stroke-width:34; stroke-linecap:round; stroke-linejoin:round; }
    </style>
  </defs>

  <rect width="2400" height="1700" fill="#F7F1E6"/>
  <text x="120" y="100" fill="#111827" font-family="Georgia, serif" font-style="italic" font-size="54" font-weight="700">Head in the Clouds</text>
  <text x="120" y="145" class="caption">APP ICON SYMBOL EXPLORATION · VECTOR-FIRST · NO AIRPLANE / NO PHOTO CLOUDS</text>

  <!-- Card helper: row 1 col 1 -->
  <g transform="translate(120 230)">
    <text x="0" y="-24" class="label">01 Folded Whisper</text>
    <rect class="icon-bg" width="520" height="520" rx="112" fill="url(#navyA)"/>
    <path d="M132 290 C196 240, 246 239, 308 278 S420 318, 428 226" class="paper-stroke"/>
    <path d="M206 255 L278 370 L334 278" fill="none" stroke="#D8B56C" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M154 330 C225 356, 330 360, 404 330" class="thin" opacity="0.38"/>
    <circle cx="408" cy="224" r="15" fill="#E1BD72"/>
    <text x="0" y="575" class="caption">一句话被折起，像心事，也像航线</text>
  </g>

  <!-- row 1 col 2 -->
  <g transform="translate(730 230)">
    <text x="0" y="-24" class="label">02 Cloud Pause</text>
    <rect class="icon-bg" width="520" height="520" rx="112" fill="url(#navyB)"/>
    <path d="M158 334 C211 286, 291 284, 352 334" fill="none" stroke="#F8E6B8" stroke-width="32" stroke-linecap="round"/>
    <circle cx="386" cy="334" r="18" fill="#E1BD72"/>
    <path d="M198 376 H324" fill="none" stroke="#E1BD72" stroke-width="13" stroke-linecap="round" opacity="0.82"/>
    <path d="M230 194 C253 172, 288 168, 312 189 C335 209, 334 244, 310 264 C286 286, 250 286, 226 265 C202 244, 203 215, 230 194Z" fill="#FFF3D5"/>
    <path d="M280 244 C270 274, 248 304, 214 327" fill="none" stroke="#FFF3D5" stroke-width="30" stroke-linecap="round"/>
    <text x="0" y="575" class="caption">逗号/停顿：云上的一句未说完</text>
  </g>

  <!-- row 1 col 3 -->
  <g transform="translate(1340 230)">
    <text x="0" y="-24" class="label">03 Altitude Mark</text>
    <rect class="icon-bg" width="520" height="520" rx="112" fill="url(#navyA)"/>
    <path d="M104 332 C196 250, 320 247, 420 332" class="hairline"/>
    <path d="M170 330 C236 363, 306 361, 374 330" class="thin" opacity="0.32"/>
    <circle cx="104" cy="332" r="18" fill="#DAB66D"/>
    <circle cx="420" cy="332" r="18" fill="#DAB66D"/>
    <path d="M262 218 C285 250, 288 292, 260 334 C232 292, 236 250, 262 218Z" fill="#FFF3D5" transform="rotate(48 262 276)"/>
    <text x="0" y="575" class="caption">高度线中间的心事节点</text>
  </g>

  <!-- row 2 col 1 -->
  <g transform="translate(120 920)">
    <text x="0" y="-24" class="label">04 Quiet Window</text>
    <rect class="icon-bg" width="520" height="520" rx="112" fill="#07142C"/>
    <rect x="162" y="92" width="196" height="302" rx="96" fill="url(#skyWarm)" stroke="#F5DBA0" stroke-width="18"/>
    <path d="M166 282 C208 245, 257 237, 304 259 C326 270, 345 286, 356 302 V394 H162 V326 C162 306, 163 293, 166 282Z" fill="#07142C" opacity="0.74"/>
    <path d="M198 348 H322" class="thin" opacity="0.55"/>
    <circle cx="338" cy="184" r="11" fill="#F5DBA0"/>
    <text x="0" y="575" class="caption">仍有舷窗，但抽象到“安静入口”</text>
  </g>

  <!-- row 2 col 2 -->
  <g transform="translate(730 920)">
    <text x="0" y="-24" class="label">05 Sentence Horizon</text>
    <rect class="icon-bg" width="520" height="520" rx="112" fill="url(#navyB)"/>
    <path d="M122 300 C210 236, 314 236, 398 300" fill="none" stroke="#D9B76D" stroke-width="17" stroke-linecap="round"/>
    <path d="M178 318 C234 342, 291 342, 346 318" fill="none" stroke="#FFF3D5" stroke-width="24" stroke-linecap="round"/>
    <path d="M214 238 H312" fill="none" stroke="#F8E6B8" stroke-width="13" stroke-linecap="round"/>
    <path d="M236 272 H284" fill="none" stroke="#F8E6B8" stroke-width="13" stroke-linecap="round" opacity="0.78"/>
    <circle cx="398" cy="300" r="18" fill="#E1BD72"/>
    <text x="0" y="575" class="caption">一句话落在地平线之前</text>
  </g>

  <!-- row 2 col 3 -->
  <g transform="translate(1340 920)">
    <text x="0" y="-24" class="label">06 Cloud Seal</text>
    <rect class="icon-bg" width="520" height="520" rx="112" fill="url(#navyA)"/>
    <circle cx="260" cy="260" r="150" fill="none" stroke="#D8B56C" stroke-width="18"/>
    <circle cx="260" cy="260" r="116" fill="none" stroke="#F2DBA3" stroke-width="8" stroke-dasharray="28 22" opacity="0.82"/>
    <path d="M158 310 C187 268, 238 255, 279 282 C302 247, 355 253, 378 310Z" fill="#FFF3D5"/>
    <path d="M171 246 C218 198, 279 196, 326 246" fill="none" stroke="#D8B56C" stroke-width="13" stroke-linecap="round"/>
    <circle cx="171" cy="246" r="15" fill="#D8B56C"/>
    <circle cx="326" cy="246" r="15" fill="#D8B56C"/>
    <text x="0" y="575" class="caption">最接近“印章”，但更像品牌资产</text>
  </g>

  <g transform="translate(1950 260)">
    <text x="0" y="0" class="label">判断标准</text>
    <text x="0" y="55" class="caption">1. 28px 还能认出来</text>
    <text x="0" y="95" class="caption">2. 不像航班工具</text>
    <text x="0" y="135" class="caption">3. 不靠文案解释也有情绪</text>
    <text x="0" y="175" class="caption">4. 黑白单色能成立</text>
    <text x="0" y="245" class="label">我的优先级</text>
    <text x="0" y="300" class="caption">A: 02 Cloud Pause</text>
    <text x="0" y="340" class="caption">B: 01 Folded Whisper</text>
    <text x="0" y="380" class="caption">C: 05 Sentence Horizon</text>
    <text x="0" y="470" fill="#4B5563" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24">
      这不是最终稿，是符号方向板。
    </text>
    <text x="0" y="510" fill="#4B5563" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24">
      下一步只从前三个里选一个深化。
    </text>
  </g>
</svg>
