  <text x="70" y="120" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="20" fill="#6A746F">Based on v7-06 Warm Control. Goal: keep thematic warmth without falling back to old beige stationery or gold aviation.</text>
