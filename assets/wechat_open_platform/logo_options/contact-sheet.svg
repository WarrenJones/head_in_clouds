<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1400" viewBox="0 0 1800 1400">
  <rect width="1800" height="1400" fill="#F7F1E2"/>
  <text x="90" y="105" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="54" font-weight="800" fill="#071426">云上心事 Logo Options</text>
  <text x="92" y="158" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="26" fill="#5C667A">All options are designed to stay legible at 28x28 and avoid the old cloud-heart cliche.</text>

  <g transform="translate(130 250)">
    <image href="option-a-window-horizon.svg" x="0" y="0" width="360" height="360"/>
    <text x="0" y="445" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="36" font-weight="800" fill="#071426">A Window Horizon</text>
    <text x="0" y="495" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" fill="#5C667A">premium / App Store friendly / most abstract</text>
  </g>

  <g transform="translate(960 250)">
    <image href="option-b-ticket-route.svg" x="0" y="0" width="360" height="360"/>
    <text x="0" y="445" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="36" font-weight="800" fill="#071426">B Ticket Route</text>
    <text x="0" y="495" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" fill="#5C667A">product-specific / card-native / strongest fit</text>
  </g>

  <g transform="translate(130 815)">
    <image href="option-c-paper-star.svg" x="0" y="0" width="360" height="360"/>
    <text x="0" y="445" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="36" font-weight="800" fill="#071426">C Paper Star</text>
    <text x="0" y="495" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" fill="#5C667A">kinetic / travel symbol / more generic</text>
  </g>

  <g transform="translate(960 815)">
    <image href="option-d-postcard-moon.svg" x="0" y="0" width="360" height="360"/>
    <text x="0" y="445" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="36" font-weight="800" fill="#071426">D Postcard Moon</text>
    <text x="0" y="495" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" fill="#5C667A">emotional / postcard-native / softer</text>
  </g>
</svg>
