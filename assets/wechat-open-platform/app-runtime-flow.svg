<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBF6EE"/>
      <stop offset="58%" stop-color="#F6EFE5"/>
      <stop offset="100%" stop-color="#EEF5F2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#24302D" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; font-size: 54px; font-weight: 700; fill: #24302D; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; font-size: 25px; fill: #68716D; }
      .step-title { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; font-size: 30px; font-weight: 700; fill: #24302D; }
      .step-copy { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; font-size: 22px; fill: #68716D; }
      .badge { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; font-size: 18px; font-weight: 700; fill: #FBF6EE; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; font-size: 18px; fill: #8B938F; }
    </style>
  </defs>
  <rect width="1600" height="1100" fill="url(#bg)"/>
  <circle cx="1320" cy="190" r="210" fill="#FFFFFF" opacity="0.34"/>
  <circle cx="230" cy="890" r="260" fill="#FFFFFF" opacity="0.32"/>
  <path d="M196 760C410 620 710 642 946 752C1118 832 1282 826 1434 700" fill="none" stroke="#D87561" stroke-width="10" stroke-linecap="round" opacity="0.18"/>

  <g transform="translate(115 110)">
    <path d="M42 38H132" fill="none" stroke="#24302D" stroke-width="24" stroke-linecap="round"/>
    <path d="M31 102C67 84 108 88 148 112" fill="none" stroke="#24302D" stroke-width="28" stroke-linecap="round"/>
    <circle cx="151" cy="112" r="13" fill="#D87561"/>
    <path d="M72 146H122" fill="none" stroke="#A9B9B4" stroke-width="15" stroke-linecap="round"/>
  </g>
  <text x="330" y="170" class="title">云上心事 · 应用运行流程图</text>
  <text x="330" y="215" class="subtitle">飞行前记录一句话，补充航班信息，生成云卡片，并通过微信分享给朋友或朋友圈。</text>

  <g filter="url(#shadow)">
    <rect x="120" y="315" width="300" height="230" rx="36" fill="#FFFFFF"/>
    <rect x="160" y="355" width="58" height="58" rx="18" fill="#24302D"/>
    <text x="181" y="393" class="badge">1</text>
    <text x="160" y="450" class="step-title">打开应用</text>
    <text x="160" y="495" class="step-copy">新用户可游客进入</text>
    <text x="160" y="528" class="step-copy">查看隐私与权限说明</text>
  </g>

  <path d="M445 430H545" fill="none" stroke="#A9B9B4" stroke-width="8" stroke-linecap="round"/>
  <path d="M522 404L554 430L522 456" fill="none" stroke="#A9B9B4" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="570" y="315" width="300" height="230" rx="36" fill="#FFFFFF"/>
    <rect x="610" y="355" width="58" height="58" rx="18" fill="#24302D"/>
    <text x="631" y="393" class="badge">2</text>
    <text x="610" y="450" class="step-title">写下一句话</text>
    <text x="610" y="495" class="step-copy">输入飞行中的想法</text>
    <text x="610" y="528" class="step-copy">本地离线自动保存</text>
  </g>

  <path d="M895 430H995" fill="none" stroke="#A9B9B4" stroke-width="8" stroke-linecap="round"/>
  <path d="M972 404L1004 430L972 456" fill="none" stroke="#A9B9B4" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="1020" y="315" width="300" height="230" rx="36" fill="#FFFFFF"/>
    <rect x="1060" y="355" width="58" height="58" rx="18" fill="#24302D"/>
    <text x="1081" y="393" class="badge">3</text>
    <text x="1060" y="450" class="step-title">补充航班</text>
    <text x="1060" y="495" class="step-copy">输入航班号或扫码</text>
    <text x="1060" y="528" class="step-copy">验证后进入同班机</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="345" y="665" width="300" height="230" rx="36" fill="#FFFFFF"/>
    <rect x="385" y="705" width="58" height="58" rx="18" fill="#24302D"/>
    <text x="406" y="743" class="badge">4</text>
    <text x="385" y="800" class="step-title">生成云卡片</text>
    <text x="385" y="845" class="step-copy">一句话 + 航线信息</text>
    <text x="385" y="878" class="step-copy">保存到本地相册</text>
  </g>

  <path d="M1110 575C1030 648 850 690 672 757" fill="none" stroke="#A9B9B4" stroke-width="8" stroke-linecap="round"/>
  <path d="M707 722L668 759L721 765" fill="none" stroke="#A9B9B4" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M670 780H770" fill="none" stroke="#A9B9B4" stroke-width="8" stroke-linecap="round"/>
  <path d="M747 754L779 780L747 806" fill="none" stroke="#A9B9B4" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="795" y="665" width="300" height="230" rx="36" fill="#FFFFFF"/>
    <rect x="835" y="705" width="58" height="58" rx="18" fill="#24302D"/>
    <text x="856" y="743" class="badge">5</text>
    <text x="835" y="800" class="step-title">微信分享</text>
    <text x="835" y="845" class="step-copy">分享给好友或朋友圈</text>
    <text x="835" y="878" class="step-copy">好友打开同班机页面</text>
  </g>

  <g transform="translate(1225 700)">
    <rect x="0" y="0" width="200" height="150" rx="28" fill="#24302D" opacity="0.96"/>
    <path d="M64 55H116" fill="none" stroke="#FBF6EE" stroke-width="16" stroke-linecap="round"/>
    <path d="M55 92C78 81 105 83 130 98" fill="none" stroke="#FBF6EE" stroke-width="18" stroke-linecap="round"/>
    <circle cx="132" cy="98" r="9" fill="#D87561"/>
    <text x="31" y="132" class="small" fill="#FBF6EE">Cloud Card</text>
  </g>
  <text x="1120" y="895" class="small">用于微信开放平台审核</text>
</svg>
