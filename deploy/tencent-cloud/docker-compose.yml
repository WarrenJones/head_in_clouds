services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.server
    restart: unless-stopped
    volumes:
      - head_in_clouds_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  head-in-clouds-api:
    build:
      context: ../../server
    env_file:
      - .env.server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - head_in_clouds_local:/app/.local
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  head_in_clouds_local:
  head_in_clouds_postgres:
